active_provider: qwen35_plus
active_tts_provider: gpt_sovits_1
providers:
  qwen35_plus:
    type: qwen35
    display_name: Qwen 3.5
    base_url: https://localhost:11451/v1
    model: qwen3.5:4b
    # api_key is intentionally omitted; use DASHSCOPE_API_KEY env var
    api_key_env: ollama
    timeout_ms: 60000

  gpt_sovits_1:
    type: tts_gpt_sovits
    base_url: http://127.0.0.1:9880
    tts_voice: default
    tts_language: auto
    voice_output_language: jp
    timeout_sec: 120
    use_model_lang: false
    endpoint: /tts
    speed: 1
    top_k: 5
    top_p: 1
    temperature: 1
    ref_audio_path: C:\Users\Administrator\Documents\VS_code\open-yachiyo\ref_8s.mp3
    prompt_text: ""
    prompt_language: jp

