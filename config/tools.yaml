version: 1

policy:
  allow:
    - get_time
    - add
    - echo
    - memory_write
    - memory_search
    - workspace.write_file
    - shell.exec
    - shell.approve
    - persona.update_profile
    - voice.tts_aliyun_vc
    - voice.asr_aliyun
    - voice.stats
    - live2d.param.set
    - live2d.param.batch_set
    - live2d.motion.play
    - live2d.expression.set
    - live2d.emote
    - live2d.gesture
    - live2d.react
    - desktop.perception.capabilities
    - desktop.displays.list
    - desktop.capture.screen
    - desktop.capture.region
    - desktop.capture.delete
    - desktop.inspect.screen
    - desktop.inspect.region
  deny: []
  byProvider: {}

exec:
  security: allowlist
  safeBins:
    - echo
    - pwd
    - ls
    - cat
    - grep
  timeoutSec: 20
  maxOutputChars: 8000
  workspaceOnly: true

tools:
  - name: get_time
    type: local
    adapter: builtin.get_time
    description: Get local time.
    side_effect_level: none
    input_schema:
      type: object
      properties: {}
      additionalProperties: false

  - name: add
    type: local
    adapter: builtin.add
    description: Add two numbers.
    side_effect_level: none
    input_schema:
      type: object
      properties:
        a: { type: number }
        b: { type: number }
      required: [a, b]
      additionalProperties: false

  - name: echo
    type: local
    adapter: builtin.echo
    description: Echo input text.
    side_effect_level: none
    input_schema:
      type: object
      properties:
        text: { type: string }
      required: [text]
      additionalProperties: false

  - name: memory_write
    type: local
    adapter: memory.write
    description: Write durable long-term memory entry.
    side_effect_level: write
    requires_lock: true
    input_schema:
      type: object
      properties:
        content: { type: string }
        keywords:
          type: array
          items: { type: string }
      required: [content]
      additionalProperties: false

  - name: memory_search
    type: local
    adapter: memory.search
    description: Search long-term memory by keywords.
    side_effect_level: read
    input_schema:
      type: object
      properties:
        query: { type: string }
        limit: { type: integer, minimum: 1, maximum: 20 }
      required: [query]
      additionalProperties: false

  - name: workspace.write_file
    type: local
    adapter: fs.write_file
    description: Write content to file under workspace.
    side_effect_level: write
    requires_lock: true
    input_schema:
      type: object
      properties:
        path: { type: string }
        content: { type: string }
        mode: { type: string, enum: [overwrite, append] }
      required: [path, content]
      additionalProperties: false

  - name: shell.exec
    type: local
    adapter: shell.exec
    description: Execute safe shell command under workspace.
    side_effect_level: write
    requires_lock: true
    input_schema:
      type: object
      properties:
        command: { type: string }
        timeoutSec: { type: integer, minimum: 1, maximum: 120 }
      required: [command]
      additionalProperties: false

  - name: shell.approve
    type: local
    adapter: shell.approve
    description: Approve pending shell.exec request in current session.
    side_effect_level: write
    requires_lock: true
    input_schema:
      type: object
      properties:
        approval_id: { type: string }
        scope: { type: string, enum: [once, always] }
      required: [approval_id]
      additionalProperties: false

  - name: persona.update_profile
    type: local
    adapter: builtin.persona_update_via_curl
    description: Update global persona profile by calling gateway persona API via curl.
    side_effect_level: write
    requires_lock: true
    input_schema:
      type: object
      properties:
        custom_name: { type: string }
      required: [custom_name]
      additionalProperties: false

  - name: voice.tts_aliyun_vc
    type: local
    adapter: voice.tts_aliyun_vc
    description: >
      Generate speech audio via Qwen3-TTS-VC (Aliyun DashScope).
      Only provide text and voiceTag. Model and voice are managed by the qwen3_tts provider config and must NOT be passed.
    side_effect_level: write
    requires_lock: true
    input_schema:
      type: object
      properties:
        text: { type: string }
        voiceTag: { type: string, enum: [zh, jp, en] }
        durationSec: { type: [number, string] }
        duration_sec: { type: [number, string] }
        timeoutSec: { type: integer, minimum: 1, maximum: 120 }
        turnId: { type: string }
        idempotencyKey: { type: string }
        replyMeta:
          type: object
          properties:
            inputType: { type: string, enum: [text, audio] }
            sentenceCount: { type: integer, minimum: 1 }
            containsCode: { type: boolean }
            containsTable: { type: boolean }
            containsManyLinks: { type: boolean }
            isTroubleshooting: { type: boolean }
          additionalProperties: false
      required: [text]
      additionalProperties: false

  - name: voice.asr_aliyun
    type: local
    adapter: voice.asr_aliyun
    description: Transcribe audio to text with Aliyun ASR and feed into session loop.
    side_effect_level: read
    input_schema:
      type: object
      properties:
        audioRef: { type: string }
        format: { type: string, enum: [wav, mp3, ogg, webm, m4a] }
        lang: { type: string, enum: [zh, en, auto] }
        timeoutSec: { type: integer, minimum: 1, maximum: 120 }
        hints:
          type: array
          items: { type: string }
      required: [audioRef, format]
      additionalProperties: false

  - name: voice.stats
    type: local
    adapter: voice.stats
    description: Return in-memory voice pipeline metrics snapshot.
    side_effect_level: read
    input_schema:
      type: object
      properties: {}
      additionalProperties: false

  - name: live2d.param.set
    type: local
    adapter: live2d.param.set
    description: Set one Live2D model parameter by name.
    side_effect_level: write
    requires_lock: true
    input_schema:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 128 }
        value: { type: number }
      required: [name, value]
      additionalProperties: false

  - name: live2d.param.batch_set
    type: local
    adapter: live2d.param.batch_set
    description: Set multiple Live2D model parameters in one call.
    side_effect_level: write
    requires_lock: true
    input_schema:
      type: object
      properties:
        updates:
          type: array
          minItems: 1
          maxItems: 60
          items:
            type: object
            properties:
              name: { type: string, minLength: 1, maxLength: 128 }
              value: { type: number }
            required: [name, value]
            additionalProperties: false
      required: [updates]
      additionalProperties: false

  - name: live2d.motion.play
    type: local
    adapter: live2d.motion.play
    description: >
      Play one Live2D motion group/index.
      Supported group/index pairs: Idle/0, Greet/0, ReactError/0.
      Always set duration_sec to match current chat context.
    side_effect_level: write
    requires_lock: true
    input_schema:
      type: object
      properties:
        group: { type: string, enum: [Idle, Greet, ReactError] }
        index: { type: integer, enum: [0] }
        action_id: { type: string, minLength: 1, maxLength: 160 }
        duration_sec: { type: number, exclusiveMinimum: 0, maximum: 120 }
        queue_policy: { type: string, enum: [append, replace, interrupt] }
      required: [group]
      additionalProperties: false

  - name: live2d.expression.set
    type: local
    adapter: live2d.expression.set
    description: >
      Set one Live2D expression by name.
      Supported expressions: smile, tear_drop, tears, narrow_eyes.
      Always set duration_sec to match current chat context.
    side_effect_level: write
    requires_lock: true
    input_schema:
      type: object
      properties:
        name: { type: string, enum: [smile, tear_drop, tears, narrow_eyes] }
        action_id: { type: string, minLength: 1, maxLength: 160 }
        duration_sec: { type: number, exclusiveMinimum: 0, maximum: 120 }
        queue_policy: { type: string, enum: [append, replace, interrupt] }
      required: [name]
      additionalProperties: false

  - name: live2d.emote
    type: local
    adapter: live2d.emote
    description: >
      Trigger semantic emotion preset and map to expression/parameters.
      Supported presets: happy(low|medium|high), sad(medium only), happy_soft(low|medium|high),
      happy_bright(low|medium|high), sad_soft(low|medium|high), cry(low|medium|high), shy(low|medium|high).
      Always set duration_sec to match current chat context.
    side_effect_level: write
    requires_lock: true
    input_schema:
      type: object
      properties:
        emotion: { type: string, enum: [happy, sad, happy_soft, happy_bright, sad_soft, cry, shy] }
        intensity: { type: string, enum: [low, medium, high] }
        action_id: { type: string, minLength: 1, maxLength: 160 }
        duration_sec: { type: number, exclusiveMinimum: 0, maximum: 120 }
        queue_policy: { type: string, enum: [append, replace, interrupt] }
        timeoutMs: { type: integer, minimum: 500, maximum: 120000 }
      allOf:
        - if:
            properties:
              emotion: { const: sad }
          then:
            properties:
              intensity: { type: string, enum: [medium] }
      required: [emotion]
      additionalProperties: false

  - name: live2d.gesture
    type: local
    adapter: live2d.gesture
    description: >
      Trigger semantic gesture preset and map to motion/expression.
      Supported gesture types: greet, think, greet_fast, think_focus, apologize, panic, calm_down.
      Always set duration_sec to match current chat context.
    side_effect_level: write
    requires_lock: true
    input_schema:
      type: object
      properties:
        type: { type: string, enum: [greet, think, greet_fast, think_focus, apologize, panic, calm_down] }
        action_id: { type: string, minLength: 1, maxLength: 160 }
        duration_sec: { type: number, exclusiveMinimum: 0, maximum: 120 }
        queue_policy: { type: string, enum: [append, replace, interrupt] }
        timeoutMs: { type: integer, minimum: 500, maximum: 120000 }
      required: [type]
      additionalProperties: false

  - name: live2d.react
    type: local
    adapter: live2d.react
    description: >
      Trigger semantic reaction preset sequence.
      Supported intents: success, error, waiting, apologize, panic, calm_down.
      Always set duration_sec to match current chat context.
    side_effect_level: write
    requires_lock: true
    input_schema:
      type: object
      properties:
        intent: { type: string, enum: [success, error, waiting, apologize, panic, calm_down] }
        action_id: { type: string, minLength: 1, maxLength: 160 }
        duration_sec: { type: number, exclusiveMinimum: 0, maximum: 120 }
        queue_policy: { type: string, enum: [append, replace, interrupt] }
        timeoutMs: { type: integer, minimum: 500, maximum: 120000 }
      required: [intent]
      additionalProperties: false

  - name: desktop.displays.list
    type: local
    adapter: desktop.displays.list
    description: List desktop displays exposed by the desktop-live2d RPC server.
    side_effect_level: read
    input_schema:
      type: object
      properties: {}
      additionalProperties: false

  - name: desktop.perception.capabilities
    type: local
    adapter: desktop.perception.capabilities
    description: Report whether desktop screen capture and inspect prerequisites are currently available.
    side_effect_level: read
    input_schema:
      type: object
      properties: {}
      additionalProperties: false

  - name: desktop.capture.screen
    type: local
    adapter: desktop.capture.screen
    description: Capture one full display through desktop-live2d RPC and return capture metadata.
    side_effect_level: read
    requires_lock: true
    input_schema:
      type: object
      properties:
        displayId: { type: [integer, string] }
        display_id: { type: [integer, string] }
      additionalProperties: false

  - name: desktop.capture.region
    type: local
    adapter: desktop.capture.region
    description: Capture one rectangular desktop region through desktop-live2d RPC and return capture metadata.
    side_effect_level: read
    requires_lock: true
    input_schema:
      type: object
      properties:
        x: { type: integer }
        y: { type: integer }
        width: { type: integer, minimum: 1 }
        height: { type: integer, minimum: 1 }
        displayId: { type: [integer, string] }
        display_id: { type: [integer, string] }
      required: [x, y, width, height]
      additionalProperties: false

  - name: desktop.capture.delete
    type: local
    adapter: desktop.capture.delete
    description: Delete one temporary desktop capture through desktop-live2d RPC.
    side_effect_level: write
    requires_lock: true
    input_schema:
      type: object
      properties:
        captureId: { type: string, minLength: 1, maxLength: 128 }
        capture_id: { type: string, minLength: 1, maxLength: 128 }
      anyOf:
        - required: [captureId]
        - required: [capture_id]
      additionalProperties: false

  - name: desktop.inspect.screen
    type: local
    adapter: desktop.inspect.screen
    description: Capture one display and ask the active multimodal LLM to analyze the screenshot against a prompt.
    side_effect_level: read
    requires_lock: true
    input_schema:
      type: object
      properties:
        prompt: { type: string, minLength: 1, maxLength: 2000 }
        displayId: { type: [integer, string] }
        display_id: { type: [integer, string] }
      required: [prompt]
      additionalProperties: false

  - name: desktop.inspect.region
    type: local
    adapter: desktop.inspect.region
    description: Capture one desktop region and ask the active multimodal LLM to analyze the screenshot against a prompt.
    side_effect_level: read
    requires_lock: true
    input_schema:
      type: object
      properties:
        prompt: { type: string, minLength: 1, maxLength: 2000 }
        x: { type: integer }
        y: { type: integer }
        width: { type: integer, minimum: 1 }
        height: { type: integer, minimum: 1 }
        displayId: { type: [integer, string] }
        display_id: { type: [integer, string] }
      required: [prompt, x, y, width, height]
      additionalProperties: false
