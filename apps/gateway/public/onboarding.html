<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yachiyo Onboarding</title>
  <link rel="stylesheet" href="/system.css" />
  <link rel="stylesheet" href="/onboarding.css" />
</head>
<body>
  <main class="onboarding-shell">
    <header class="onboarding-header">
      <h1>初次配置向导</h1>
      <p>完成 LLM、语音与偏好配置后即可开始使用。</p>
      <div class="onboarding-steps">
        <span id="stepMark1" class="step-mark active">1. LLM</span>
        <span id="stepMark2" class="step-mark">2. 语音克隆</span>
        <span id="stepMark3" class="step-mark">3. 偏好</span>
      </div>
    </header>

    <section id="step1" class="panel">
      <h2>Step 1: LLM Provider</h2>
      <div class="grid">
        <label>Provider Key <input id="llmKey" value="qwen35_plus" /></label>
        <label>Display Name <input id="llmDisplayName" value="Qwen 3.5 Plus" /></label>
        <label>Base URL <input id="llmBaseUrl" value="https://dashscope.aliyuncs.com/compatible-mode/v1" /></label>
        <label>Model <input id="llmModel" value="qwen3.5-plus" /></label>
        <label>API Key <input id="llmApiKey" type="password" /></label>
        <label>Timeout (ms) <input id="llmTimeoutMs" type="number" value="20000" /></label>
      </div>
      <div class="actions">
        <button id="saveProviderBtn" class="btn btn-primary">保存并下一步</button>
      </div>
    </section>

    <section id="step2" class="panel hidden">
      <h2>Step 2: 声线克隆 + TTS</h2>
      <div class="grid">
        <label>百炼 API Key <input id="ttsApiKey" type="password" /></label>
        <label>TTS Base URL <input id="ttsBaseUrl" value="https://dashscope.aliyuncs.com/api/v1" /></label>
      </div>
      <fieldset class="mode-switch">
        <legend>TTS 模式</legend>
        <label><input type="radio" name="ttsMode" value="normal" checked /> 普通 tts-vc</label>
        <label><input type="radio" name="ttsMode" value="realtime" /> 实时 tts-vc-realtime</label>
      </fieldset>
      <div class="grid">
        <label>Preferred Name <input id="voicePreferredName" value="yachiyo-main-voice" /></label>
        <label>手动 Voice ID（可选）<input id="voiceManualId" placeholder="可跳过克隆直接填写" /></label>
      </div>
      <div class="grid">
        <label>参考音频（wav/mp3/m4a）
          <input id="voiceAudioFile" type="file" accept=".wav,.mp3,.m4a,audio/*" />
        </label>
      </div>
      <div class="actions">
        <button id="voiceCloneBtn" class="btn btn-primary">上传并克隆</button>
        <button id="voiceSaveManualBtn" class="btn">仅保存手动 Voice ID</button>
        <button id="backToStep1Btn" class="btn">上一步</button>
      </div>
    </section>

    <section id="step3" class="panel hidden">
      <h2>Step 3: 基础偏好</h2>
      <div class="grid">
        <label>自动语音回复 <input id="prefAutoReplyEnabled" type="checkbox" checked /></label>
        <label>max chars <input id="prefMaxChars" type="number" value="220" /></label>
        <label>cooldown sec/session <input id="prefCooldownSec" type="number" value="2" /></label>
        <label>max tts/min <input id="prefMaxTtsPerMinute" type="number" value="3" /></label>
        <label>persona mode
          <select id="prefPersonaMode">
            <option value="hybrid">hybrid</option>
            <option value="rational">rational</option>
            <option value="idol">idol</option>
            <option value="strict">strict</option>
          </select>
        </label>
        <label>max context chars <input id="prefMaxContextChars" type="number" value="1500" /></label>
        <label>workspace skills <input id="prefSkillsWorkspace" type="checkbox" checked /></label>
        <label>global skills <input id="prefSkillsGlobal" type="checkbox" checked /></label>
      </div>
      <div class="actions">
        <button id="savePrefsBtn" class="btn btn-primary">保存偏好</button>
        <button id="backToStep2Btn" class="btn">上一步</button>
      </div>
      <div class="actions">
        <button id="completeBtn" class="btn btn-success">完成 onboarding</button>
      </div>
    </section>

    <footer class="status-bar">
      <span id="statusText">准备就绪</span>
    </footer>
  </main>

  <script src="/onboarding.js"></script>
</body>
</html>
