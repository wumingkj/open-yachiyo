<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Config v2 — Yachiyo</title>
  <link rel="stylesheet" href="/system.css" />
  <link rel="stylesheet" href="/config-v2.css" />
</head>
<body>
  <div class="cv2-shell">

    <!-- ── Header ── -->
    <header class="cv2-header" role="banner">
      <div class="cv2-header-left">
        <h1 class="cv2-title">Config v2</h1>
        <p class="cv2-subtitle">编辑所有配置文件，保存后新会话立即生效。</p>
      </div>
      <div class="cv2-header-actions">
        <label class="theme-control" for="themeSelect">
          <span>Theme</span>
          <select id="themeSelect" aria-label="切换主题">
            <option value="auto">auto</option>
            <option value="light">light</option>
            <option value="dark">dark</option>
          </select>
        </label>
        <a class="btn" href="/">Back to Chat</a>
        <a class="btn" href="/config.html">Providers (v1)</a>
      </div>
    </header>

    <!-- ── Tab bar ── -->
    <nav class="cv2-tabbar" role="tablist" aria-label="配置文件选择">
      <!-- tabs injected by JS -->
    </nav>

    <!-- ── Main layout ── -->
    <div class="cv2-main">

      <!-- Editor pane -->
      <section class="cv2-editor-pane panel" aria-label="YAML 编辑器">
        <div class="cv2-editor-toolbar">
          <span id="cv2-file-label" class="cv2-file-label" aria-live="polite"></span>
          <span id="cv2-readonly-badge" class="cv2-readonly-badge" aria-label="只读文件" hidden>只读</span>
          <div class="cv2-toolbar-actions">
            <button class="btn" id="loadBtn" type="button">重新加载</button>
            <button class="btn btn-primary" id="saveBtn" type="button">保存</button>
          </div>
        </div>

        <!-- Provider quick-panel (only visible on providers tab) -->
        <div id="cv2-provider-panel" class="cv2-provider-panel" hidden>
          <div class="cv2-pp-section">
            <div class="cv2-pp-head">
              <strong>Active LLM Provider</strong>
            </div>
            <div class="cv2-pp-row">
              <select id="cv2-activeLlm" aria-label="Active LLM Provider"></select>
            </div>
          </div>
          <div class="cv2-pp-section">
            <div class="cv2-pp-head">
              <strong>Active TTS Provider</strong>
              <button class="btn cv2-pp-add-btn" id="cv2-addTtsBtn" type="button">+ Add TTS</button>
            </div>
            <div class="cv2-pp-row">
              <select id="cv2-activeTts" aria-label="Active TTS Provider"></select>
            </div>
            <div id="cv2-ttsCards" class="cv2-pp-cards"></div>
          </div>
        </div>

        <!-- Idle Chatter form-panel (only visible on idle-chatter tab) -->
        <div id="cv2-idle-panel" class="cv2-idle-panel" hidden>
          <!-- Master switch -->
          <div class="cv2-idle-section">
            <label class="cv2-idle-toggle">
              <input type="checkbox" id="ic-enabled" />
              <span>启用空闲闲聊</span>
            </label>
          </div>

          <!-- Timing -->
          <div class="cv2-idle-section">
            <div class="cv2-idle-section-title">Timing</div>
            <div class="cv2-idle-grid">
              <div class="cv2-idle-field">
                <label for="ic-idle-threshold">空闲触发阈值 (秒)</label>
                <input type="number" id="ic-idle-threshold" min="30" step="30" />
                <span class="cv2-idle-hint">用户无操作多久后触发</span>
              </div>
              <div class="cv2-idle-field">
                <label for="ic-cooldown">冷却时间 (秒)</label>
                <input type="number" id="ic-cooldown" min="60" step="60" />
                <span class="cv2-idle-hint">两次触发的最小间隔</span>
              </div>
              <div class="cv2-idle-field">
                <label for="ic-jitter">随机抖动 (秒)</label>
                <input type="number" id="ic-jitter" min="0" step="30" />
                <span class="cv2-idle-hint">避免机械感的随机延迟</span>
              </div>
              <div class="cv2-idle-field">
                <label for="ic-max-per-hour">每小时最大次数</label>
                <input type="number" id="ic-max-per-hour" min="1" max="20" />
              </div>
              <div class="cv2-idle-field">
                <label for="ic-startup-delay">启动延迟 (秒)</label>
                <input type="number" id="ic-startup-delay" min="0" step="10" />
              </div>
              <div class="cv2-idle-field">
                <label class="cv2-idle-toggle">
                  <input type="checkbox" id="ic-suppress-during-response" />
                  <span>回复中抑制触发</span>
                </label>
              </div>
            </div>
          </div>

          <!-- Topics -->
          <div class="cv2-idle-section">
            <div class="cv2-idle-section-title">
              Topics
              <button class="btn cv2-pp-add-btn" id="ic-add-topic-btn" type="button">+ Add</button>
            </div>
            <div id="ic-topics-list" class="cv2-idle-tags"></div>
          </div>

          <!-- Time Greetings -->
          <div class="cv2-idle-section">
            <div class="cv2-idle-section-title">
              Time Greetings
              <button class="btn cv2-pp-add-btn" id="ic-add-greeting-btn" type="button">+ Add</button>
            </div>
            <div id="ic-greetings-list" class="cv2-idle-greetings"></div>
          </div>

          <!-- System Prompt -->
          <div class="cv2-idle-section">
            <div class="cv2-idle-section-title">System Prompt Prefix</div>
            <textarea id="ic-system-prompt" class="cv2-idle-textarea" rows="3" placeholder="发送给 LLM 的系统前缀..."></textarea>
          </div>

          <!-- Form actions -->
          <div class="cv2-idle-actions">
            <button class="btn btn-primary" id="ic-save-btn" type="button">保存配置</button>
            <button class="btn" id="ic-reset-btn" type="button">重置</button>
          </div>
        </div>

        <div class="cv2-editor-wrap">
          <textarea
            id="editor"
            class="cv2-editor"
            spellcheck="false"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            aria-label="YAML 编辑器"
            aria-describedby="cv2-status"
            placeholder="loading..."
          ></textarea>
        </div>

        <div class="cv2-editor-footer">
          <span id="cv2-status" class="status" role="status" aria-live="polite"></span>
        </div>

        <!-- Git log panel -->
        <section class="cv2-git-panel" aria-label="版本历史">
          <div class="cv2-git-header">
            <span class="cv2-git-title">版本历史</span>
            <span id="cv2-dirty-badge" class="cv2-dirty-badge" hidden aria-label="有未提交的改动">● 未提交</span>
            <div class="cv2-git-pagination" role="group" aria-label="版本历史翻页">
              <button class="btn cv2-git-page-btn" id="gitPrevBtn" type="button" aria-label="上一页" disabled>‹</button>
              <span id="gitPageInfo" class="cv2-git-page-info" aria-live="polite">1 / 1</span>
              <button class="btn cv2-git-page-btn" id="gitNextBtn" type="button" aria-label="下一页" disabled>›</button>
            </div>
            <button class="btn cv2-git-refresh" id="gitRefreshBtn" type="button" aria-label="刷新版本历史">↻</button>
          </div>
          <ol id="cv2-git-log" class="cv2-git-log" aria-label="提交记录列表"></ol>
        </section>
      </section>

      <!-- Agent pane -->
      <aside class="cv2-agent-pane panel" aria-label="Agent 对话">
        <div class="cv2-agent-header">
          <span class="cv2-agent-title">Agent 对话</span>
          <span class="cv2-agent-hint">当前文件内容自动注入为上下文</span>
        </div>

        <div
          id="agentMessages"
          class="cv2-agent-messages"
          role="log"
          aria-live="polite"
          aria-label="对话记录"
          aria-relevant="additions"
        ></div>

        <div class="cv2-agent-input-row">
          <label for="agentInput" class="sr-only">向 Agent 提问</label>
          <input
            id="agentInput"
            type="text"
            class="cv2-agent-input"
            placeholder="问 agent 如何修改配置…"
            aria-label="向 Agent 提问"
            autocomplete="off"
          />
          <button class="btn btn-primary" id="agentSendBtn" type="button" aria-label="发送消息">发送</button>
        </div>
      </aside>

    </div><!-- /.cv2-main -->
  </div><!-- /.cv2-shell -->

  <script src="/config-v2.js"></script>
</body>
</html>
