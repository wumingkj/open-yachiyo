<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yachiyo Chat</title>
  <link rel="stylesheet" href="/system.css" />
  <link rel="stylesheet" href="/chat.css" />
</head>
<body class="chat-page">
  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-top">
        <button id="newSessionBtn" class="btn btn-primary">+ New chat</button>
        <a class="config-link" href="/config-v2.html">Config</a>

        <section class="persona-panel">
          <div class="persona-title">Persona</div>
          <input id="personaCustomName" class="persona-input" type="text" placeholder="自定义称呼（留空=主人）" />
          <button id="savePersonaBtn" class="btn">保存称呼</button>
          <div id="personaHint" class="persona-hint"></div>
        </section>
      </div>
      <div class="session-title">Sessions</div>
      <div id="sessionList" class="session-list"></div>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <button id="menuBtn" class="btn btn-ghost menu-btn" title="Toggle sidebar">☰</button>
        <div class="chat-header-main">
          <div id="activeSessionName" class="session-name">New chat</div>
          <div id="runtimeStatus" class="runtime-status">Idle</div>
        </div>
        <div class="session-permission-wrap">
          <label for="sessionPermissionSelect" class="session-permission-label">Permission</label>
          <select id="sessionPermissionSelect" class="session-permission-select">
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
          </select>
        </div>
        <div class="theme-wrap">
          <label for="themeSelect" class="session-permission-label">Theme</label>
          <select id="themeSelect" class="session-permission-select theme-select">
            <option value="auto">auto</option>
            <option value="light">light</option>
            <option value="dark">dark</option>
          </select>
        </div>
        <button id="debugPanelToggleBtn" class="btn" type="button">Debug Panel</button>
      </header>

      <section id="messageList" class="message-list"></section>
      <section id="debugPanel" class="debug-panel">
        <div class="debug-toolbar">
          <div class="debug-status-wrap">
            <span class="debug-label">Debug Stream</span>
            <span id="debugStreamStatus" class="debug-stream-status">Disconnected</span>
          </div>
          <div class="debug-actions">
            <button id="debugConnectBtn" class="btn" type="button">Connect</button>
            <button id="debugDisconnectBtn" class="btn" type="button">Disconnect</button>
            <button id="debugModeBtn" class="btn" type="button">Debug OFF</button>
            <button id="debugClearBtn" class="btn" type="button">Clear</button>
          </div>
        </div>
        <div class="debug-filter-row">
          <input id="debugTopicsInput" class="debug-input" type="text" placeholder="topics: runtime.event,shell.exec.stdout,tool.call.result" />
          <input id="debugTokenInput" class="debug-input" type="password" placeholder="optional token (if DEBUG_STREAM_BEARER_TOKEN is set)" />
        </div>
        <div id="debugStreamList" class="debug-stream-list"></div>
      </section>

      <footer class="composer-wrap">
        <div class="composer-inner">
          <textarea id="chatInput" rows="1" placeholder="Send a message..."></textarea>
          <div class="composer-actions">
            <input id="imageInput" type="file" accept="image/*" multiple hidden />
            <button id="addImageBtn" class="btn btn-attach" type="button">Image</button>
            <button id="sendBtn" class="btn btn-send" type="button">Send</button>
          </div>
        </div>
        <div id="uploadPreviewList" class="upload-preview-list"></div>
        <div class="composer-tip">
          Enter 发送（输入法选词时不会发送），Shift+Enter 换行。支持图片上传与多模态提问。
          <span id="versionTag" class="version-tag">branch: unknown</span>
        </div>
      </footer>
    </main>
  </div>

  <div id="imageLightbox" class="image-lightbox" aria-hidden="true">
    <button id="lightboxCloseBtn" class="btn lightbox-close-btn" type="button">Close</button>
    <img id="lightboxImage" class="lightbox-image" alt="preview" />
  </div>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      securityLevel: 'loose'
    });
    window.mermaid = mermaid;
  </script>
  <script src="/chatImageUtils.js"></script>
  <script src="/chat.js"></script>
</body>
</html>
